# Fly.io config for company-accounting
# Deploy: fly deploy
# Create Postgres first: fly postgres create

app = "company-accounting"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 100

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[deploy]
  release_command = "npx prisma migrate deploy && npx prisma db seed || true"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
