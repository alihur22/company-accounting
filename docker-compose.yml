# Local development / production-like run
# Usage: docker-compose up
# App: http://localhost:8000

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/accounting.db
      - UPLOAD_DIR=/app/uploads
      - STATIC_DIR=/app/static
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads

volumes:
  app_data:
  app_uploads:
